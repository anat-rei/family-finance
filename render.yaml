services:
  - type: web
    name: family-finance-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: PYTHONPATH=backend uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
